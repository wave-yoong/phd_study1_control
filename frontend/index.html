<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #e5e5e5;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #202123;
        }

        .chat-header p {
            font-size: 11px;
            color: #8e8ea0;
        }

        .new-chat-btn {
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid #d1d1d6;
            border-radius: 6px;
            font-size: 14px;
            color: #202123;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .new-chat-btn:hover {
            background: #f7f7f8;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message-wrapper {
            width: 100%;
            border-bottom: 1px solid #f0f0f0;
            padding: 24px 0;
        }

        .message-wrapper.user {
            background-color: #ffffff;
        }

        .message-wrapper.assistant {
            background-color: #f7f7f8;
        }

        .message-content {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 16px;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-wrapper.user .message-avatar {
            background-color: #19c37d;
            color: white;
        }

        .message-wrapper.assistant .message-avatar {
            background-color: #ab68ff;
            color: white;
        }

        .message-text {
            flex: 1;
            color: #202123;
            line-height: 1.75;
            font-size: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
        }

        .input-container {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 12px 50px 12px 16px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: #19c37d;
            box-shadow: 0 0 0 1px #19c37d;
        }

        .send-button {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 32px;
            height: 32px;
            background: #ffffff;
            color: #8e8ea0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:enabled:hover {
            background: #f7f7f8;
        }

        .send-button:enabled {
            color: #202123;
        }

        .send-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            display: none;
        }

        .loading.active {
            display: block;
        }

        .loading .message-text::after {
            content: '▋';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 10px 20px;
            font-size: 14px;
            text-align: center;
        }

        .welcome-message {
            max-width: 768px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .welcome-message h2 {
            font-size: 32px;
            color: #202123;
            margin-bottom: 32px;
        }

        .welcome-box {
            background: #f7f7f8;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 15px;
            color: #6e6e80;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-left">
            <h1>AI Assistant</h1>
            <p>무엇을 도와드릴까요?</p>
        </div>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message" id="welcomeMessage">
            <h2>AI Assistant</h2>
            <div class="welcome-box">
                무엇을 도와드릴까요?
            </div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-container">
            <textarea 
                class="chat-input" 
                id="messageInput" 
                placeholder="메시지를 입력하세요..."
                rows="1"
                autocomplete="off"
            ></textarea>
            <button class="send-button" id="sendButton">&#10148;</button>
        </div>
    </div>

    <script>
        let conversationId = null;
        const apiBase = window.location.origin;

        // New Chat function
        function newChat() {
            location.reload();
        }

        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Initialize conversation on load
        async function initializeConversation() {
            try {
                const response = await fetch(`${apiBase}/api/conversation`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    conversationId = data.conversation_id;
                    console.log('Conversation started:', conversationId);
                } else {
                    showError('대화를 시작할 수 없습니다: ' + data.error);
                }
            } catch (error) {
                showError('네트워크 오류: ' + error.message);
            }
        }

        function hideWelcome() {
            const welcome = document.getElementById('welcomeMessage');
            if (welcome) {
                welcome.style.display = 'none';
            }
        }

        function addMessage(role, content) {
            hideWelcome();
            
            const messagesDiv = document.getElementById('chatMessages');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';
            
            const text = document.createElement('div');
            text.className = 'message-text';
            text.textContent = content;
            
            messageContent.appendChild(avatar);
            messageContent.appendChild(text);
            wrapper.appendChild(messageContent);
            
            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return wrapper;
        }

        let loadingElement = null;

        function showLoading(show) {
            if (show) {
                hideWelcome();
                const messagesDiv = document.getElementById('chatMessages');
                
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper assistant loading active';
                
                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = 'AI';
                
                const text = document.createElement('div');
                text.className = 'message-text';
                
                messageContent.appendChild(avatar);
                messageContent.appendChild(text);
                wrapper.appendChild(messageContent);
                
                messagesDiv.appendChild(wrapper);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                loadingElement = wrapper;
            } else {
                if (loadingElement) {
                    loadingElement.remove();
                    loadingElement = null;
                }
            }
        }

        function showError(message) {
            hideWelcome();
            const messagesDiv = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            messagesDiv.appendChild(errorDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!conversationId) {
                showError('대화가 시작되지 않았습니다. 페이지를 새로고침해주세요.');
                return;
            }
            
            // Disable input while processing
            input.disabled = true;
            sendButton.disabled = true;
            
            // Add user message to UI
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // Show loading indicator
            showLoading(true);
            
            try {
                const response = await fetch(`${apiBase}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId
                    })
                });
                
                const data = await response.json();
                
                showLoading(false);
                
                if (data.success) {
                    // Add assistant response to UI
                    addMessage('assistant', data.response);
                } else {
                    showError('오류: ' + data.error);
                }
            } catch (error) {
                showLoading(false);
                showError('네트워크 오류: ' + error.message);
            } finally {
                // Re-enable input
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        // Event listeners
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize on page load
        window.addEventListener('load', initializeConversation);
    </script>
</body>
</html>
