<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Control Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .header {
            background: #ffffff;
            color: #202123;
            padding: 12px 16px;
            border-bottom: 1px solid #ececf1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .header p {
            font-size: 12px;
            color: #8e8ea0;
            margin: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #202123;
        }
        
        .message-content {
            padding: 16px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .message-content * {
            font-weight: normal !important;
        }
        
        .message.user .message-content {
            background: #f7f7f8;
            color: #202123;
            border: none;
        }
        
        .message.assistant .message-content {
            background: #ffffff;
            color: #202123;
            border: none;
        }
        
        .message-content a {
            color: #10a37f;
            text-decoration: underline;
            word-break: break-all;
        }
        
        .message-content a:hover {
            color: #0d8c6d;
        }
        
        .message.system .message-content {
            background: #f7f7f8;
            color: #6e6e80;
            text-align: center;
            font-style: normal;
            border: none;
            font-size: 14px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ececf1;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
            max-width: 100%;
            background: #f7f7f8;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid #d1d5db;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            color: #202123;
        }
        
        #userInput:focus {
            outline: none;
        }
        
        #userInput::placeholder {
            color: #8e8ea0;
        }
        
        button {
            padding: 10px 20px;
            background: #ffffff;
            color: #202123;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        button:hover {
            background: #f7f7f8;
            border-color: #202123;
        }
        
        button:disabled {
            background: #f7f7f8;
            cursor: not-allowed;
            color: #d1d5db;
            border-color: #d1d5db;
        }
        
        .send-btn {
            padding: 8px 12px;
            background: #ffffff;
            color: #202123;
            border: 1px solid #d1d5db;
        }
        
        .send-btn:hover {
            color: #10a37f;
            border-color: #10a37f;
        }
        
        .send-btn:disabled {
            color: #d1d5db;
        }
        
        .btn-reset {
            background: #ffffff;
            color: #202123;
            border: 1px solid #d1d5db;
        }
        
        .btn-reset:hover {
            background: #f7f7f8;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: #8e8ea0;
            font-style: normal;
            font-size: 14px;
        }
        
        .loading.active {
            display: block;
        }
        
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #fcc;
            display: none;
            font-size: 14px;
        }
        
        .error-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>AI Assistant</h1>
            </div>
            <button class="btn-reset" onclick="resetChat()">New Chat</button>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message system">
                <div class="message-content">
                    무엇을 도와드릴까요?
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loading">Thinking...</div>
            
            <div class="input-group" id="queryInput">
                <input type="text" id="userInput" placeholder="메시지를 입력하세요..." />
                <button onclick="sendMessage()" class="send-btn" title="전송" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let conversationId = null;
        
        function convertLinksToClickable(text) {
            // Remove markdown bold syntax **text**
            text = text.replace(/\*\*(.+?)\*\*/g, '$1');
            const urlPattern = /(https?:\/\/[^\s<]+[^<.,;:!?\s)])/g;
            return text.replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color: #10a37f; text-decoration: underline;">$1</a>');
        }

        function addMessage(role, content, isSystem = false) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSystem ? 'system' : role}`;
            
            let header = '';
            if (!isSystem && role === 'user') {
                header = 'You';
            }
            
            const processedContent = convertLinksToClickable(content.replace(/\n/g, '<br>'));
            
            messageDiv.innerHTML = `
                ${header ? `<div class="message-header">${header}</div>` : ''}
                <div class="message-content">${processedContent}</div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function setLoading(isLoading) {
            const loading = document.getElementById('loading');
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (isLoading) {
                loading.classList.add('active');
                input.disabled = true;
                sendBtn.disabled = true;
            } else {
                loading.classList.remove('active');
                input.disabled = false;
                sendBtn.disabled = false;
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 5000);
        }
        
        async function initializeConversation() {
            try {
                const response = await fetch('/api/conversation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    conversationId = data.conversation_id;
                    console.log('Conversation started:', conversationId);
                } else {
                    showError('Failed to start conversation: ' + data.error);
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) {
                showError('메시지를 입력해주세요');
                return;
            }
            
            if (!conversationId) {
                showError('대화가 시작되지 않았습니다. 페이지를 새로고침해주세요.');
                return;
            }
            
            addMessage('user', message);
            input.value = '';
            setLoading(true);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    showError(`Server error (${response.status}): ${errorText}`);
                    setLoading(false);
                    return;
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    showError(data.error || 'Unknown error');
                    setLoading(false);
                    return;
                }
                
                addMessage('assistant', data.response);
                setLoading(false);
                
            } catch (error) {
                showError('Error: ' + error.message);
                setLoading(false);
            }
        }
        
        async function resetChat() {
            location.reload();
        }
        
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        window.addEventListener('load', initializeConversation);
    </script>
</body>
</html>
